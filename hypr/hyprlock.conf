# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

general {
    immediate_render = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = 0, -170
    halign = center
    valign = center
}

background {
    path = $HOME/.local/share/wallpaper/wallpaper
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

label {
    monitor =
    text = Hi there, <span color='##52A8FF'>$USER</span>
    color = rgba(200, 200, 200, 1.0)
    font_size = 30
    font_family = Noto Sans

    position = 0, -70
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 125
    font_family = Noto Sans

    position = 0, -285
    halign = center
    valign = top
}

image {
    monitor =
    path = $HOME/Downloads/profile.jpg
    size = 300
    rounding = 20 # no rounding

    position = 0, 150
    halign = center
    valign = center
}

# NeurIPS 2026 Deadline Countdown
shape {
    monitor =
    size = 530, 190
    color = rgba(0, 0, 0, 0.55)
    rounding = 15
    border_size = 2
    border_color = rgba(255, 215, 0, 0.3)

    position = 0, -387
    halign = center
    valign = center
    zindex = 0
}

label {
    monitor =
    text = <span color='##FFD700' font_weight='bold'>NeurIPS 2026</span>
    color = rgba(255, 255, 255, 0.9)
    font_size = 22
    font_family = Noto Sans

    position = 0, -325
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:60000] dl=$(TZ='Etc/GMT+12' date -d '2026-05-04 23:59:59' +%s); now=$(date +%s); d=$((dl-now)); if [ $d -le 0 ]; then echo "<span color='##FF6633'>Abstract DDL: PASSED</span>"; else printf "Abstract DDL: <span color='##FFD700' font_weight='bold' font_size='larger'>%dd %dh</span>" $((d/86400)) $(((d%86400)/3600)); fi
    color = rgba(255, 255, 255, 0.9)
    font_size = 18
    font_family = Noto Sans

    position = 0, -368
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:60000] dl=$(TZ='Etc/GMT+12' date -d '2026-05-06 23:59:59' +%s); now=$(date +%s); d=$((dl-now)); if [ $d -le 0 ]; then echo "<span color='##FF6633'>Full Paper DDL: PASSED</span>"; else printf "Full Paper DDL: <span color='##FFD700' font_weight='bold' font_size='larger'>%dd %dh</span>" $((d/86400)) $(((d%86400)/3600)); fi
    color = rgba(255, 255, 255, 0.9)
    font_size = 18
    font_family = Noto Sans

    position = 0, -403
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = <span color='##FF4444' font_weight='bold'><i>Done is better than perfect. MUST SUBMIT!</i></span>
    color = rgba(255, 255, 255, 0.9)
    font_size = 18
    font_family = Noto Sans

    position = 0, -448
    halign = center
    valign = center
    zindex = 1
}
