# Wrapper - loads patched config, falls back to original on failure.
# Generated by install_grub_patch.py. Do not edit manually.
insmod configfile
search --no-floppy --fs-uuid --set=efi_part @UUID@
set efi_envfile="($efi_part)/grubenv"
source $prefix/patched-grub.cfg
if [ "${patched_loaded}" != "1" ]; then
    configfile $prefix/original-grub.cfg
fi
